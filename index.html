<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TV Tracker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0f14;
      --surface: #161920;
      --surface2: #1e2130;
      --surface3: #252a3a;
      --border: #2e3450;
      --accent: #6c63ff;
      --accent2: #ff6b9d;
      --accent-glow: rgba(108, 99, 255, 0.35);
      --text: #e8eaf0;
      --text-muted: #7b82a0;
      --watched-color: #2ecc71;
      --watchlist-color: #f39c12;
      --radius: 14px;
      --radius-sm: 8px;
      --shadow: 0 8px 32px rgba(0,0,0,0.45);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Header ── */
    header {
      background: linear-gradient(135deg, #1a1d2e 0%, #0d0f14 100%);
      border-bottom: 1px solid var(--border);
      padding: 1.25rem 1.5rem;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(12px);
    }
    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: .6rem;
      font-size: 1.4rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      white-space: nowrap;
    }
    .logo-icon { font-size: 1.6rem; }
    .logo span { background: linear-gradient(90deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

    /* ── Search ── */
    .search-wrap {
      flex: 1;
      min-width: 240px;
      position: relative;
    }
    .search-input {
      width: 100%;
      padding: .7rem 1rem .7rem 2.8rem;
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: 50px;
      color: var(--text);
      font-size: 1rem;
      transition: border-color .2s, box-shadow .2s;
      outline: none;
    }
    .search-input::placeholder { color: var(--text-muted); }
    .search-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }
    .search-icon {
      position: absolute;
      left: .9rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 1rem;
      pointer-events: none;
    }
    .spinner {
      position: absolute;
      right: 1rem;
      top: 50%;
      transform: translateY(-50%);
      width: 16px; height: 16px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      display: none;
    }
    .spinner.active { display: block; }
    @keyframes spin { to { transform: translateY(-50%) rotate(360deg); } }

    /* ── Autocomplete dropdown ── */
    .dropdown {
      position: absolute;
      top: calc(100% + 6px);
      left: 0; right: 0;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
      z-index: 200;
      display: none;
      max-height: 440px;
      overflow-y: auto;
    }
    .dropdown.open { display: block; animation: fadeDown .15s ease; }
    @keyframes fadeDown { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: none; } }

    .dd-item {
      display: flex;
      align-items: center;
      gap: .85rem;
      padding: .7rem 1rem;
      cursor: pointer;
      transition: background .15s;
      border-bottom: 1px solid var(--border);
    }
    .dd-item:last-child { border-bottom: none; }
    .dd-item:hover, .dd-item.focused { background: var(--surface2); }
    .dd-poster {
      width: 40px; height: 56px;
      border-radius: 6px;
      object-fit: cover;
      background: var(--surface3);
      flex-shrink: 0;
    }
    .dd-poster-placeholder {
      width: 40px; height: 56px;
      border-radius: 6px;
      background: var(--surface3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      flex-shrink: 0;
    }
    .dd-info { flex: 1; min-width: 0; }
    .dd-name { font-weight: 600; font-size: .95rem; truncate: true; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .dd-meta { font-size: .78rem; color: var(--text-muted); margin-top: 2px; }
    .dd-empty { padding: 1.2rem; text-align: center; color: var(--text-muted); font-size: .9rem; }

    /* ── Main layout ── */
    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }

    /* ── Tab nav ── */
    .tabs {
      display: flex;
      gap: .5rem;
      margin-bottom: 2rem;
      border-bottom: 1.5px solid var(--border);
      padding-bottom: 0;
    }
    .tab-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 1rem;
      font-weight: 600;
      padding: .6rem 1.25rem;
      cursor: pointer;
      border-bottom: 2.5px solid transparent;
      margin-bottom: -1.5px;
      transition: color .2s, border-color .2s;
      display: flex;
      align-items: center;
      gap: .45rem;
      white-space: nowrap;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { color: var(--text); border-bottom-color: var(--accent); }
    .tab-btn.active.watchlist { border-bottom-color: var(--watchlist-color); }
    .badge {
      background: var(--surface3);
      color: var(--text-muted);
      font-size: .7rem;
      font-weight: 700;
      padding: .1rem .45rem;
      border-radius: 20px;
      min-width: 20px;
      text-align: center;
    }
    .tab-btn.active .badge { background: var(--accent); color: #fff; }
    .tab-btn.active.watchlist .badge { background: var(--watchlist-color); }

    /* ── Tab panels ── */
    .panel { display: none; }
    .panel.active { display: block; animation: fadeIn .2s ease; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    /* ── Section header ── */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.25rem;
      flex-wrap: wrap;
      gap: .75rem;
    }
    .section-title {
      font-size: 1.1rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: .5rem;
    }
    .dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      display: inline-block;
    }
    .dot-watched { background: var(--watched-color); box-shadow: 0 0 6px var(--watched-color); }
    .dot-watchlist { background: var(--watchlist-color); box-shadow: 0 0 6px var(--watchlist-color); }

    .sort-select {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: .35rem .75rem;
      border-radius: 8px;
      font-size: .85rem;
      cursor: pointer;
    }

    /* ── Cards grid ── */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
      gap: 1.25rem;
    }

    .show-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      cursor: pointer;
      transition: transform .2s, box-shadow .2s, border-color .2s;
      position: relative;
      animation: cardIn .25s ease;
    }
    @keyframes cardIn { from { opacity: 0; transform: scale(.95); } to { opacity: 1; transform: none; } }
    .show-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 36px rgba(0,0,0,.55);
      border-color: var(--accent);
    }
    .card-poster-wrap {
      position: relative;
      width: 100%;
      padding-top: 140%;
      background: var(--surface2);
      overflow: hidden;
    }
    .card-poster {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }
    .card-poster-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
    }
    .card-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, transparent 50%, rgba(0,0,0,.85) 100%);
      opacity: 0;
      transition: opacity .2s;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding-bottom: .75rem;
      gap: .5rem;
    }
    .show-card:hover .card-overlay { opacity: 1; }
    .card-action-btn {
      background: rgba(255,255,255,.15);
      backdrop-filter: blur(6px);
      border: 1px solid rgba(255,255,255,.25);
      color: #fff;
      width: 36px; height: 36px;
      border-radius: 50%;
      font-size: 1rem;
      cursor: pointer;
      transition: background .15s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card-action-btn:hover { background: rgba(255,255,255,.3); }
    .card-action-btn.delete:hover { background: rgba(220,50,50,.7); }

    .card-body { padding: .65rem .75rem .75rem; }
    .card-title {
      font-size: .88rem;
      font-weight: 700;
      line-height: 1.3;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-year { font-size: .75rem; color: var(--text-muted); margin-top: .2rem; }
    .card-badge {
      position: absolute;
      top: .5rem;
      right: .5rem;
      font-size: .65rem;
      font-weight: 700;
      padding: .15rem .5rem;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: .04em;
    }
    .card-badge.watched { background: rgba(46,204,113,.25); color: var(--watched-color); border: 1px solid var(--watched-color); }
    .card-badge.watchlist { background: rgba(243,156,18,.2); color: var(--watchlist-color); border: 1px solid var(--watchlist-color); }
    .card-rating {
      font-size: .75rem;
      color: #fbbf24;
      margin-top: .2rem;
      display: flex;
      align-items: center;
      gap: .2rem;
    }

    /* ── Empty state ── */
    .empty-state {
      text-align: center;
      padding: 4rem 1rem;
      color: var(--text-muted);
    }
    .empty-icon { font-size: 3.5rem; margin-bottom: .75rem; opacity: .5; }
    .empty-title { font-size: 1.15rem; font-weight: 700; color: var(--text); margin-bottom: .4rem; }
    .empty-desc { font-size: .9rem; }

    /* ── Modal ── */
    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.7);
      z-index: 300;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      backdrop-filter: blur(4px);
    }
    .modal-backdrop.open { display: flex; animation: backdropIn .2s ease; }
    @keyframes backdropIn { from { opacity: 0; } to { opacity: 1; } }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      width: 100%;
      max-width: 560px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 24px 80px rgba(0,0,0,.7);
      animation: modalIn .2s ease;
    }
    @keyframes modalIn { from { opacity: 0; transform: scale(.94) translateY(10px); } to { opacity: 1; transform: none; } }

    .modal-header {
      position: relative;
      height: 200px;
      overflow: hidden;
      border-radius: 20px 20px 0 0;
    }
    .modal-backdrop-img {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      filter: blur(12px) brightness(.5);
      transform: scale(1.1);
    }
    .modal-poster-wrap {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .modal-poster {
      height: 170px;
      border-radius: 10px;
      box-shadow: 0 8px 24px rgba(0,0,0,.6);
      object-fit: cover;
    }
    .modal-poster-placeholder {
      height: 170px;
      width: 120px;
      border-radius: 10px;
      background: var(--surface3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
    }
    .modal-close {
      position: absolute;
      top: .75rem;
      right: .75rem;
      background: rgba(0,0,0,.5);
      border: none;
      color: #fff;
      width: 34px; height: 34px;
      border-radius: 50%;
      font-size: 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .15s;
      z-index: 2;
    }
    .modal-close:hover { background: rgba(200,0,0,.6); }

    .modal-body { padding: 1.5rem; }
    .modal-title { font-size: 1.4rem; font-weight: 800; line-height: 1.3; margin-bottom: .3rem; }
    .modal-meta {
      display: flex;
      flex-wrap: wrap;
      gap: .4rem;
      margin-bottom: 1rem;
    }
    .meta-chip {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-size: .75rem;
      padding: .2rem .65rem;
      border-radius: 20px;
    }
    .meta-chip.rating { color: #fbbf24; border-color: #fbbf2450; }
    .modal-summary {
      font-size: .88rem;
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 1.25rem;
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .modal-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: .75rem;
    }
    .modal-btn {
      padding: .8rem;
      border: none;
      border-radius: var(--radius-sm);
      font-size: .95rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity .15s, transform .1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .5rem;
    }
    .modal-btn:active { transform: scale(.97); }
    .modal-btn:disabled { opacity: .45; cursor: not-allowed; }
    .modal-btn.watched {
      background: linear-gradient(135deg, #1e7e34, var(--watched-color));
      color: #fff;
    }
    .modal-btn.watchlist {
      background: linear-gradient(135deg, #b07d10, var(--watchlist-color));
      color: #fff;
    }
    .modal-btn.move {
      background: var(--surface3);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .modal-btn.remove {
      background: rgba(220, 50, 50, .15);
      color: #f56565;
      border: 1px solid rgba(220, 50, 50, .3);
    }

    .already-badge {
      text-align: center;
      padding: .6rem;
      border-radius: 8px;
      font-size: .85rem;
      font-weight: 600;
      margin-bottom: .75rem;
    }
    .already-badge.watched { background: rgba(46,204,113,.1); color: var(--watched-color); }
    .already-badge.watchlist { background: rgba(243,156,18,.1); color: var(--watchlist-color); }

    /* ── Toast ── */
    #toast-container {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      z-index: 500;
      display: flex;
      flex-direction: column;
      gap: .5rem;
      pointer-events: none;
    }
    .toast {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: .75rem 1.1rem;
      border-radius: var(--radius-sm);
      font-size: .88rem;
      box-shadow: var(--shadow);
      display: flex;
      align-items: center;
      gap: .5rem;
      animation: toastIn .3s ease;
      max-width: 280px;
    }
    @keyframes toastIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: none; } }
    .toast.fade-out { animation: toastOut .3s ease forwards; }
    @keyframes toastOut { to { opacity: 0; transform: translateX(20px); } }
    .toast-icon { font-size: 1.1rem; }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .logo { font-size: 1.1rem; }
      .search-input { font-size: .9rem; }
      .modal-actions { grid-template-columns: 1fr; }
      .cards-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">
      <span class="logo-icon">📺</span>
      <span>TV<strong>Tracker</strong></span>
    </div>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input id="searchInput" class="search-input" type="text"
        placeholder="Search for a TV show…" autocomplete="off" spellcheck="false" />
      <div class="spinner" id="spinner"></div>
      <div class="dropdown" id="dropdown"></div>
    </div>
  </div>
</header>

<main>
  <div class="tabs">
    <button class="tab-btn active" data-tab="watched">
      ✅ Watched <span class="badge" id="watchedBadge">0</span>
    </button>
    <button class="tab-btn watchlist" data-tab="watchlist">
      🎬 Want to Watch <span class="badge" id="watchlistBadge">0</span>
    </button>
  </div>

  <div class="panel active" id="panel-watched">
    <div class="section-header">
      <div class="section-title"><span class="dot dot-watched"></span> Shows I've Watched</div>
      <select class="sort-select" id="sortWatched" onchange="renderLists()">
        <option value="added">Recently Added</option>
        <option value="name">A – Z</option>
        <option value="rating">Top Rated</option>
        <option value="year">Year</option>
      </select>
    </div>
    <div class="cards-grid" id="watchedGrid"></div>
  </div>

  <div class="panel" id="panel-watchlist">
    <div class="section-header">
      <div class="section-title"><span class="dot dot-watchlist"></span> My Watchlist</div>
      <select class="sort-select" id="sortWatchlist" onchange="renderLists()">
        <option value="added">Recently Added</option>
        <option value="name">A – Z</option>
        <option value="rating">Top Rated</option>
        <option value="year">Year</option>
      </select>
    </div>
    <div class="cards-grid" id="watchlistGrid"></div>
  </div>
</main>

<!-- Modal -->
<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal" id="modal">
    <div class="modal-header" id="modalHeader">
      <button class="modal-close" id="modalClose">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<!-- Toast container -->
<div id="toast-container"></div>

<script>
// ── State ────────────────────────────────────────────────────────────────────
let watched   = JSON.parse(localStorage.getItem('tvtracker_watched')   || '[]');
let watchlist = JSON.parse(localStorage.getItem('tvtracker_watchlist') || '[]');
let currentShow = null;
let searchTimer = null;
let ddFocusIdx = -1;
let ddItems = [];

// ── Persistence ───────────────────────────────────────────────────────────────
function save() {
  localStorage.setItem('tvtracker_watched',   JSON.stringify(watched));
  localStorage.setItem('tvtracker_watchlist', JSON.stringify(watchlist));
}

// ── Tabs ─────────────────────────────────────────────────────────────────────
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('panel-' + btn.dataset.tab).classList.add('active');
  });
});

// ── TVMaze Search ─────────────────────────────────────────────────────────────
async function searchShows(query) {
  const res = await fetch(`https://api.tvmaze.com/search/shows?q=${encodeURIComponent(query)}`);
  if (!res.ok) throw new Error('Search failed');
  return res.json();
}

// ── Search Input ──────────────────────────────────────────────────────────────
const searchInput = document.getElementById('searchInput');
const dropdown    = document.getElementById('dropdown');
const spinner     = document.getElementById('spinner');

searchInput.addEventListener('input', () => {
  clearTimeout(searchTimer);
  const q = searchInput.value.trim();
  if (q.length < 2) { closeDropdown(); return; }
  spinner.classList.add('active');
  searchTimer = setTimeout(async () => {
    try {
      const results = await searchShows(q);
      renderDropdown(results);
    } catch (e) {
      dropdown.innerHTML = '<div class="dd-empty">Could not reach TVmaze API. Check your connection.</div>';
      dropdown.classList.add('open');
    } finally {
      spinner.classList.remove('active');
    }
  }, 350);
});

searchInput.addEventListener('keydown', e => {
  if (!dropdown.classList.contains('open')) return;
  if (e.key === 'ArrowDown') { e.preventDefault(); moveFocus(1); }
  else if (e.key === 'ArrowUp') { e.preventDefault(); moveFocus(-1); }
  else if (e.key === 'Enter') {
    e.preventDefault();
    if (ddFocusIdx >= 0 && ddItems[ddFocusIdx]) openModal(ddItems[ddFocusIdx]);
  }
  else if (e.key === 'Escape') closeDropdown();
});

document.addEventListener('click', e => {
  if (!e.target.closest('.search-wrap')) closeDropdown();
});

function moveFocus(dir) {
  const items = dropdown.querySelectorAll('.dd-item');
  items.forEach(i => i.classList.remove('focused'));
  ddFocusIdx = Math.max(0, Math.min(ddFocusIdx + dir, items.length - 1));
  items[ddFocusIdx]?.classList.add('focused');
  items[ddFocusIdx]?.scrollIntoView({ block: 'nearest' });
}

function renderDropdown(results) {
  ddFocusIdx = -1;
  if (!results.length) {
    dropdown.innerHTML = '<div class="dd-empty">No shows found. Try a different title.</div>';
    dropdown.classList.add('open');
    ddItems = [];
    return;
  }
  ddItems = results.map(r => r.show);
  dropdown.innerHTML = results.slice(0, 8).map((r, i) => {
    const s = r.show;
    const img = s.image?.medium ? `<img class="dd-poster" src="${s.image.medium}" alt="" loading="lazy" />` : `<div class="dd-poster-placeholder">📺</div>`;
    const year = s.premiered ? s.premiered.slice(0, 4) : '';
    const genres = (s.genres || []).slice(0, 2).join(', ');
    const network = s.network?.name || s.webChannel?.name || '';
    const meta = [year, genres, network].filter(Boolean).join(' · ');
    const rating = s.rating?.average ? `⭐ ${s.rating.average}` : '';
    return `<div class="dd-item" data-idx="${i}">${img}<div class="dd-info"><div class="dd-name">${esc(s.name)}</div><div class="dd-meta">${esc(meta)} ${rating}</div></div></div>`;
  }).join('');
  dropdown.classList.add('open');
  dropdown.querySelectorAll('.dd-item').forEach(el => {
    el.addEventListener('click', () => openModal(ddItems[+el.dataset.idx]));
  });
}

function closeDropdown() {
  dropdown.classList.remove('open');
  ddFocusIdx = -1;
}

// ── Modal ─────────────────────────────────────────────────────────────────────
function openModal(show) {
  currentShow = show;
  closeDropdown();
  searchInput.value = '';

  const backdrop = document.getElementById('modalBackdrop');
  const header   = document.getElementById('modalHeader');
  const body     = document.getElementById('modalBody');

  // Header
  const imgSrc = show.image?.original || show.image?.medium;
  header.querySelector('button').outerHTML; // keep close btn
  header.innerHTML = `
    <button class="modal-close" id="modalClose">✕</button>
    ${imgSrc ? `<img class="modal-backdrop-img" src="${imgSrc}" alt="" />` : ''}
    <div class="modal-poster-wrap">
      ${imgSrc
        ? `<img class="modal-poster" src="${show.image.medium || show.image.original}" alt="${esc(show.name)}" />`
        : `<div class="modal-poster-placeholder">📺</div>`}
    </div>`;
  document.getElementById('modalClose').addEventListener('click', closeModal);

  // Determine list state
  const inWatched   = watched.find(s => s.id === show.id);
  const inWatchlist = watchlist.find(s => s.id === show.id);

  const year    = show.premiered ? show.premiered.slice(0, 4) : '';
  const status  = show.status || '';
  const genres  = (show.genres || []).slice(0, 3).join(' · ');
  const network = show.network?.name || show.webChannel?.name || '';
  const rating  = show.rating?.average;
  const summary = (show.summary || '').replace(/<[^>]+>/g, '');

  const chips = [
    year && `<span class="meta-chip">${year}</span>`,
    status && `<span class="meta-chip">${status}</span>`,
    network && `<span class="meta-chip">${esc(network)}</span>`,
    genres && `<span class="meta-chip">${esc(genres)}</span>`,
    rating && `<span class="meta-chip rating">⭐ ${rating}</span>`,
  ].filter(Boolean).join('');

  let alreadyBadge = '';
  let actions = '';

  if (inWatched) {
    alreadyBadge = `<div class="already-badge watched">✅ In your Watched list</div>`;
    actions = `
      <button class="modal-btn move" onclick="moveShow('watchlist')">🎬 Move to Watchlist</button>
      <button class="modal-btn remove" onclick="removeShow()">🗑 Remove</button>`;
  } else if (inWatchlist) {
    alreadyBadge = `<div class="already-badge watchlist">🎬 In your Watchlist</div>`;
    actions = `
      <button class="modal-btn watched" onclick="moveShow('watched')">✅ Mark as Watched</button>
      <button class="modal-btn remove" onclick="removeShow()">🗑 Remove</button>`;
  } else {
    actions = `
      <button class="modal-btn watched" onclick="addShow('watched')">✅ Add to Watched</button>
      <button class="modal-btn watchlist" onclick="addShow('watchlist')">🎬 Add to Watchlist</button>`;
  }

  body.innerHTML = `
    ${alreadyBadge}
    <div class="modal-title">${esc(show.name)}</div>
    <div class="modal-meta">${chips}</div>
    ${summary ? `<p class="modal-summary">${esc(summary)}</p>` : ''}
    <div class="modal-actions">${actions}</div>`;

  backdrop.classList.add('open');
}

function closeModal() {
  document.getElementById('modalBackdrop').classList.remove('open');
  currentShow = null;
}

document.getElementById('modalBackdrop').addEventListener('click', e => {
  if (e.target === document.getElementById('modalBackdrop')) closeModal();
});

// ── List operations ───────────────────────────────────────────────────────────
function makeEntry(show) {
  return {
    id: show.id,
    name: show.name,
    image: show.image?.medium || null,
    year: show.premiered ? show.premiered.slice(0, 4) : '',
    genres: show.genres || [],
    rating: show.rating?.average || null,
    network: show.network?.name || show.webChannel?.name || '',
    status: show.status || '',
    addedAt: Date.now(),
  };
}

function addShow(list) {
  if (!currentShow) return;
  const entry = makeEntry(currentShow);
  if (list === 'watched') {
    watched.unshift(entry);
    toast('✅', `<strong>${entry.name}</strong> added to Watched`);
  } else {
    watchlist.unshift(entry);
    toast('🎬', `<strong>${entry.name}</strong> added to Watchlist`);
  }
  save();
  renderLists();
  closeModal();
}

function removeShow() {
  if (!currentShow) return;
  const id = currentShow.id;
  const name = currentShow.name;
  watched   = watched.filter(s => s.id !== id);
  watchlist = watchlist.filter(s => s.id !== id);
  save();
  renderLists();
  toast('🗑', `<strong>${name}</strong> removed`);
  closeModal();
}

function moveShow(target) {
  if (!currentShow) return;
  const id = currentShow.id;
  watched   = watched.filter(s => s.id !== id);
  watchlist = watchlist.filter(s => s.id !== id);
  const entry = makeEntry(currentShow);
  if (target === 'watched') {
    watched.unshift(entry);
    toast('✅', `Moved to Watched`);
  } else {
    watchlist.unshift(entry);
    toast('🎬', `Moved to Watchlist`);
  }
  save();
  renderLists();
  closeModal();
}

function removeFromList(list, id, name, e) {
  e.stopPropagation();
  if (list === 'watched') watched = watched.filter(s => s.id !== id);
  else watchlist = watchlist.filter(s => s.id !== id);
  save();
  renderLists();
  toast('🗑', `<strong>${name}</strong> removed`);
}

function moveFromCard(from, to, id, e) {
  e.stopPropagation();
  const src = from === 'watched' ? watched : watchlist;
  const entry = src.find(s => s.id === id);
  if (!entry) return;
  if (from === 'watched') watched = watched.filter(s => s.id !== id);
  else watchlist = watchlist.filter(s => s.id !== id);
  entry.addedAt = Date.now();
  if (to === 'watched') { watched.unshift(entry); toast('✅', 'Moved to Watched'); }
  else { watchlist.unshift(entry); toast('🎬', 'Moved to Watchlist'); }
  save();
  renderLists();
}

// ── Render ────────────────────────────────────────────────────────────────────
function sorted(arr, key) {
  const a = [...arr];
  if (key === 'name')   return a.sort((x, y) => x.name.localeCompare(y.name));
  if (key === 'rating') return a.sort((x, y) => (y.rating || 0) - (x.rating || 0));
  if (key === 'year')   return a.sort((x, y) => (y.year || 0) - (x.year || 0));
  return a; // added (default)
}

function cardHTML(s, list) {
  const alt = list === 'watched' ? 'watchlist' : 'watched';
  const moveIcon = list === 'watched' ? '🎬' : '✅';
  const moveTitle = list === 'watched' ? 'Move to Watchlist' : 'Mark as Watched';
  return `
    <div class="show-card" onclick="openCardModal(${s.id}, '${list}')">
      <div class="card-poster-wrap">
        ${s.image
          ? `<img class="card-poster" src="${esc(s.image)}" alt="${esc(s.name)}" loading="lazy" />`
          : `<div class="card-poster-placeholder">📺</div>`}
        <span class="card-badge ${list}">${list === 'watched' ? '✅ Watched' : '🎬 Watchlist'}</span>
        <div class="card-overlay">
          <button class="card-action-btn" title="${moveTitle}"
            onclick="moveFromCard('${list}','${alt}',${s.id},event)">${moveIcon}</button>
          <button class="card-action-btn delete" title="Remove"
            onclick="removeFromList('${list}',${s.id},'${esc(s.name)}',event)">🗑</button>
        </div>
      </div>
      <div class="card-body">
        <div class="card-title">${esc(s.name)}</div>
        <div class="card-year">${s.year || ''}${s.network ? ' · ' + esc(s.network) : ''}</div>
        ${s.rating ? `<div class="card-rating">⭐ ${s.rating}</div>` : ''}
      </div>
    </div>`;
}

function renderLists() {
  const sortW  = document.getElementById('sortWatched').value;
  const sortWL = document.getElementById('sortWatchlist').value;

  const wGrid  = document.getElementById('watchedGrid');
  const wlGrid = document.getElementById('watchlistGrid');

  document.getElementById('watchedBadge').textContent   = watched.length;
  document.getElementById('watchlistBadge').textContent = watchlist.length;

  if (watched.length) {
    wGrid.innerHTML = sorted(watched, sortW).map(s => cardHTML(s, 'watched')).join('');
  } else {
    wGrid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
      <div class="empty-icon">📺</div>
      <div class="empty-title">No shows yet</div>
      <div class="empty-desc">Search for a show above and add it to your watched list.</div>
    </div>`;
  }

  if (watchlist.length) {
    wlGrid.innerHTML = sorted(watchlist, sortWL).map(s => cardHTML(s, 'watchlist')).join('');
  } else {
    wlGrid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
      <div class="empty-icon">🍿</div>
      <div class="empty-title">Your watchlist is empty</div>
      <div class="empty-desc">Find shows you want to watch and add them here.</div>
    </div>`;
  }
}

// Open modal from a card (re-fetch show details or use stored data)
async function openCardModal(id, list) {
  try {
    spinner.classList.add('active');
    const res = await fetch(`https://api.tvmaze.com/shows/${id}`);
    if (!res.ok) throw new Error();
    const show = await res.json();
    spinner.classList.remove('active');
    openModal(show);
  } catch {
    spinner.classList.remove('active');
    // Fallback: use stored data
    const entry = (list === 'watched' ? watched : watchlist).find(s => s.id === id);
    if (entry) openModal({ ...entry, image: entry.image ? { medium: entry.image } : null, rating: { average: entry.rating }, genres: entry.genres });
  }
}

// ── Toast ─────────────────────────────────────────────────────────────────────
function toast(icon, msg) {
  const container = document.getElementById('toast-container');
  const el = document.createElement('div');
  el.className = 'toast';
  el.innerHTML = `<span class="toast-icon">${icon}</span><span>${msg}</span>`;
  container.appendChild(el);
  setTimeout(() => {
    el.classList.add('fade-out');
    setTimeout(() => el.remove(), 300);
  }, 2800);
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Init ──────────────────────────────────────────────────────────────────────
renderLists();
</script>
